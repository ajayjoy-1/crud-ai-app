# 1. THE DATABASE (PostgreSQL)
databases:
  - name: crud-database
    plan: free
    region: ohio

# 2. THE WEB SERVICES (Django and React)
services:
  # THE BACKEND (Django Docker Container)
  - type: web
    name: crud-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crud-database
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: '*'

  # THE FRONTEND (React Static Site)
  - type: web
    name: crud-frontend
    runtime: static
    # NOTICE: No 'plan' field here! Static sites do not use plans.
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: crud-backend
          property: host