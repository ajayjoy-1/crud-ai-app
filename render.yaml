services:
  # 1. THE DATABASE (PostgreSQL)
  - type: psql
    name: crud-database
    plan: free
    region: ohio

  # 2. THE BACKEND (Django Docker Container)
  - type: web
    name: crud-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crud-database
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: '*'

  # 3. THE FRONTEND (React Static Site)
  - type: web
    name: crud-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: crud-backend
          property: host